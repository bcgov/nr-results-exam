name: PR

on:
  pull_request:

concurrency:
  # Cancel in progress for PR open and close
  group: ${{ github.event.number }}
  cancel-in-progress: true

jobs:
  # https://github.com/bcgov/action-builder-ghcr
  builds:
    name: Builds
    runs-on: ubuntu-24.04
    permissions:
      attestations: write
      id-token: write
      packages: write
    strategy:
      matrix:
        package: [backend, frontend]
    timeout-minutes: 10
    steps:
      - uses: bcgov/action-builder-ghcr@v4.4.1
        with:
          package: ${{ matrix.package }}
          tags: ${{ github.event.number }}
          tag_fallback: latest

  vars:
    name: Variables
    runs-on: ubuntu-24.04
    timeout-minutes: 1
    outputs:
      hostname: ${{ steps.url.outputs.hostname }}
      redirect_url: ${{ steps.url.outputs.redirect_url }}
    steps:
      - name: Calculate redirect_url and hostname
        id: url
        run: |
          DOMAIN="apps.silver.devops.gov.bc.ca"
          SUBDOMAIN="${{ github.event.repository.name }}-$(( ${{ github.event.number }} % 50 ))"
          echo "redirect_url=${SUBDOMAIN}-frontend.${DOMAIN}" >> $GITHUB_OUTPUT
          echo "hostname=${SUBDOMAIN}.${DOMAIN}" >> $GITHUB_OUTPUT

  deploys:
    name: Deploys (${{ github.event.number }})
    needs: [builds, vars]
    uses: ./.github/workflows/.deploy.yml
    secrets:
      ches_client_secret: ${{ secrets.CHES_CLIENT_SECRET }}
      oc_token: ${{ secrets.OC_TOKEN }}
      s3_secretkey: ${{ secrets.S3_SECRETKEY }}
    with:
      tag: ${{ github.event.number }}
      zone: ${{ github.event.number }}
      redirect_url: ${{ needs.vars.outputs.redirect_url }}
      hostname: ${{ needs.vars.outputs.hostname }}

  # ==========================================================================
  # WARNING: This job acts as the required merge gate for this workflow.
  # If you add a new job to this workflow, you MUST add its ID to the 'needs'
  # array below, otherwise its failure or cancellation will not block the PR!
  # ==========================================================================
  results:
    name: PR Results
    needs: [builds, deploys]
    if: always()
    runs-on: ubuntu-24.04
    timeout-minutes: 1
    steps:
      - name: Log Job Results Context
        run: |
          echo "=== Upstream Job Statuses ==="
          echo '${{ toJson(needs) }}'

      - name: Evaluate Overall Status
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: |
          echo "❌ Critical Check Failure: At least one required job has failed or was cancelled."
          exit 1

      - name: Success Message
        run: echo "✅ All critical checks passed or were intentionally skipped!"
